<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온라인 음악 파일 편집기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 12px; letter-spacing: -0.5px; }

    #lang-switcher { display: flex; gap: 4px; margin-bottom: 20px; }
    .lang-btn {
      padding: 4px 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2d2d4e;
      color: #aaa;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lang-btn.active { background: #7c6af7; color: #fff; border-color: #7c6af7; }
    .lang-btn:hover:not(.active) { border-color: #7c6af7; color: #eee; }

    #tab-bar { display: flex; gap: 4px; margin-bottom: 28px; }
    .tab {
      padding: 8px 28px;
      border: none;
      border-radius: 8px 8px 0 0;
      background: #2d2d4e;
      color: #aaa;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active { background: #7c6af7; color: #fff; }

    .merge-slot {
      width: 100%;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 12px;
      position: relative;
    }
    .merge-slot:hover, .merge-slot.drag-over { border-color: #7c6af7; background: rgba(124,106,247,0.08); }
    .merge-slot.loaded { border-style: solid; border-color: #10b981; cursor: default; }
    .merge-slot.loaded:hover { border-color: #10b981; background: rgba(16,185,129,0.06); }
    .merge-slot-info { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
    .merge-slot-clear {
      background: none; border: none; color: #ef4444;
      font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .merge-slot-clear:hover { background: rgba(239,68,68,0.1); }
    #merge-order-list { list-style: none; margin-bottom: 16px; padding: 0; }
    #merge-order-list li {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #2d2d4e; border-radius: 8px; margin-bottom: 8px;
      cursor: grab; user-select: none; border: 2px solid transparent; transition: border-color 0.15s;
    }
    #merge-order-list li.drag-over-item { border-color: #7c6af7; }
    .merge-order-num { color: #7c6af7; font-weight: 700; width: 20px; }
    .btn-merge { background: #7c6af7; color: #fff; }
    #merge-error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

    #upload-area {
      width: 100%;
      max-width: 700px;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }
    #upload-area:hover, #upload-area.drag-over {
      border-color: #7c6af7;
      background: rgba(124,106,247,0.08);
    }
    #upload-area p { color: #888; margin-top: 8px; font-size: 0.9rem; }
    #file-input { display: none; }

    #editor { width: 100%; max-width: 700px; display: none; }

    #waveform { width: 100%; background: #16213e; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }

    #region-info {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      color: #aaa;
    }
    #region-info span { color: #7c6af7; font-weight: 600; }

    #time-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    #time-input-row label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
    #time-input-row input[type="number"] {
      width: 90px;
      padding: 7px 10px;
      background: #2d2d4e;
      border: 1px solid #444;
      border-radius: 8px;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #time-input-row input[type="number"]:focus { border-color: #7c6af7; }
    #time-input-row input[type="number"]::placeholder { color: #666; }
    #time-input-row .sep { color: #555; }
    .btn-apply { background: #7c6af7; color: #fff; }
    .btn-undo    { background: #f59e0b; color: #fff; }
    .btn-recover { background: #10b981; color: #fff; }

    #controls { display: flex; gap: 12px; margin-bottom: 20px; }
    #actions { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.9; }
    button:not(:disabled):active { transform: scale(0.98); }

    .btn-secondary { background: #2d2d4e; color: #eee; }
    .btn-extract { background: #22c55e; color: #fff; }
    .btn-delete { background: #ef4444; color: #fff; }
    .btn-download { background: #7c6af7; color: #fff; }

    #error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 8px;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #waveform { touch-action: none; }

    @media (max-width: 600px) {
      body { padding: 20px 12px; }
      h1   { font-size: 1.4rem; margin-bottom: 10px; }

      #tab-bar { width: 100%; max-width: 700px; }
      .tab     { flex: 1; padding: 10px 0; text-align: center; }

      button { min-height: 44px; }

      #controls        { flex-wrap: wrap; }
      #controls button { flex: 1; min-width: 120px; }

      #actions      { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      #btn-download { grid-column: 1 / -1; }

      #time-input-row                      { flex-direction: column; align-items: stretch; gap: 8px; }
      #time-input-row .inputs-row          { display: flex; gap: 8px; align-items: center; }
      #time-input-row input[type="number"] { flex: 1; width: auto; font-size: 16px; padding: 10px 12px; }
      #time-input-row label                { font-size: 0.8rem; }
      #btn-apply-range                     { width: 100%; }

      .merge-slot          { padding: 20px 16px; }
      #merge-order-list li { min-height: 48px; }
      #btn-merge           { width: 100%; }

      .merge-slot-info { flex-wrap: wrap; gap: 8px; }
      .merge-slot-name { flex: 1; }
      .merge-slot-actions { width: 100%; justify-content: space-between; }
      .btn-merge-edit { flex: 1; }
      .merge-time-row { flex-direction: column; align-items: stretch; gap: 8px; }
      .merge-time-row .inputs-row { display: flex; gap: 8px; align-items: center; }
      .merge-time-row input[type="number"] { flex: 1; width: auto; font-size: 16px; padding: 10px 12px; }
      .btn-merge-delete { width: 100%; }
      .merge-editor-controls button { flex: 1; min-width: 0; }
      .merge-edit-status { width: 100%; text-align: center; margin-left: 0; }
    }

    .merge-slot-actions { display: flex; gap: 8px; align-items: center; }
    .btn-merge-edit {
      background: #2d2d4e; color: #7c6af7;
      border: 1px solid #44445e; padding: 6px 14px; font-size: 0.85rem;
    }
    .btn-merge-edit.open { background: #7c6af7; color: #fff; border-color: #7c6af7; }
    .merge-editor {
      display: none; margin-top: 14px; padding-top: 14px;
      border-top: 1px solid #333; text-align: left;
    }
    .merge-editor.open { display: block; }
    .merge-waveform {
      width: 100%; background: #16213e; border-radius: 8px;
      overflow: hidden; margin-bottom: 12px; touch-action: none;
    }
    .merge-time-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .merge-time-row label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
    .merge-time-row input[type="number"] {
      width: 90px; padding: 7px 10px; background: #2d2d4e;
      border: 1px solid #444; border-radius: 8px; color: #eee;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .merge-time-row input[type="number"]:focus { border-color: #7c6af7; }
    .merge-time-row input[type="number"]::placeholder { color: #666; }
    .merge-editor-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .merge-edit-status { font-size: 0.85rem; color: #10b981; margin-left: auto; }

    .deleted-region {
      background: repeating-linear-gradient(
        45deg,
        rgba(239, 68, 68, 0.15),
        rgba(239, 68, 68, 0.15) 6px,
        rgba(239, 68, 68, 0.35) 6px,
        rgba(239, 68, 68, 0.35) 12px
      ) !important;
    }
    .deleted-region-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      background: rgba(239, 68, 68, 0.85);
      padding: 2px 8px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
    }

    footer {
      width: 100%;
      max-width: 700px;
      margin-top: 48px;
      padding: 24px 0 16px;
      border-top: 1px solid #2d2d4e;
      color: #666;
      font-size: 0.8rem;
      line-height: 1.8;
    }
    footer .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-bottom: 12px;
      align-items: center;
    }
    footer .footer-links a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }
    footer .footer-links a:hover { color: #7c6af7; }
    footer .footer-info { display: flex; flex-direction: column; gap: 4px; }
    footer .footer-info span { color: #555; }
    @media (max-width: 600px) {
      footer { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <h1>🎵 <span data-i18n="title">온라인 음악 파일 편집기</span></h1>

  <div id="lang-switcher">
    <button class="lang-btn active" data-lang="ko">KO</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="ja">JA</button>
  </div>

  <div id="tab-bar">
    <button class="tab active" id="tab-editor" data-i18n="tabEditor">편집</button>
    <button class="tab" id="tab-merge" data-i18n="tabMerge">합치기</button>
  </div>

  <div id="editor-section" style="width:100%; display:flex; flex-direction:column; align-items:center;">
  <div id="upload-area">
    <input type="file" id="file-input" accept=".mp3,audio/mpeg">
    <div style="font-size: 2rem; margin-bottom: 8px;">📂</div>
    <strong data-i18n="uploadTitle">MP3 파일을 여기에 끌어다 놓거나 클릭하여 선택</strong>
    <p data-i18n="uploadHint">MP3 파일만 지원합니다</p>
    <div id="error-msg"></div>
  </div>

  <div id="editor">
    <div id="waveform"></div>
    <div id="time-input-row">
      <div class="inputs-row">
        <label data-i18n="labelStart">시작(초)</label>
        <input type="number" id="input-start" min="0" step="0.1" placeholder="0.0">
        <span class="sep">~</span>
        <label data-i18n="labelEnd">끝(초)</label>
        <input type="number" id="input-end" min="0" step="0.1" placeholder="0.0">
      </div>
      <button class="btn-apply" id="btn-apply-range" data-i18n="btnApplyRange">구간 적용</button>
    </div>
    <div id="region-info">
      <div><span data-i18n="regionStart">시작:</span> <span id="start-time">-</span></div>
      <div><span data-i18n="regionEnd">끝:</span> <span id="end-time">-</span></div>
    </div>
    <div id="controls">
      <button class="btn-secondary" id="btn-play" data-i18n="btnPlay">▶ 재생</button>
      <button class="btn-secondary" id="btn-play-region" disabled data-i18n="btnPlayRegion">구간만 미리듣기</button>
    </div>
    <div id="actions">
      <button class="btn-extract" id="btn-extract" disabled data-i18n="btnExtract">구간 추출</button>
      <button class="btn-delete" id="btn-delete" disabled data-i18n="btnDelete">구간 삭제</button>
      <button class="btn-undo" id="btn-undo" disabled data-i18n="btnUndo">↩ 되돌리기</button>
      <button class="btn-recover" id="btn-recover" disabled data-i18n="btnRecover">구간 복구</button>
      <button class="btn-download" id="btn-download" disabled data-i18n="btnDownload">다운로드</button>
    </div>
    <div id="editor-error-msg"></div>
  </div>
  </div>

  <div id="merge-section" style="display:none; width:100%; max-width:700px;">
    <div class="merge-slot" id="merge-slot-0">
      <input type="file" id="merge-input-0" accept=".mp3,audio/mpeg" style="display:none">
      <div class="merge-slot-placeholder">
        <div style="font-size:1.5rem; margin-bottom:6px;">📂</div>
        <strong data-i18n="mergeSlot0Title">첫 번째 MP3 파일</strong>
        <p style="color:#888; font-size:0.85rem; margin-top:4px;" data-i18n="mergeSlotHint">클릭하거나 끌어다 놓기</p>
      </div>
      <div class="merge-slot-info" style="display:none">
        <span class="merge-slot-name"></span>
        <span class="merge-slot-duration" style="color:#7c6af7; font-weight:600;"></span>
        <div class="merge-slot-actions">
          <button class="btn-merge-edit" id="btn-merge-edit-0" data-i18n="btnMergeEdit">편집 ▶</button>
          <button class="merge-slot-clear" title="×">×</button>
        </div>
      </div>
      <div class="merge-editor" id="merge-editor-0">
        <div class="merge-waveform" id="merge-waveform-0"></div>
        <div class="merge-time-row">
          <div class="inputs-row">
            <label data-i18n="labelStart">시작(초)</label>
            <input type="number" id="merge-start-0" min="0" step="0.1" placeholder="0.0">
            <span class="sep">~</span>
            <label data-i18n="labelEnd">끝(초)</label>
            <input type="number" id="merge-end-0" min="0" step="0.1" placeholder="0.0">
          </div>
          <button class="btn-delete btn-merge-delete" id="btn-merge-delete-0" disabled data-i18n="btnDelete">구간 삭제</button>
        </div>
        <div class="merge-editor-controls">
          <button class="btn-secondary" id="btn-merge-play-0" data-i18n="btnPlay">▶ 재생</button>
          <button class="btn-undo" id="btn-merge-undo-0" disabled data-i18n="btnMergeUndo">↩ 실행취소</button>
          <span class="merge-edit-status" id="merge-edit-status-0"></span>
        </div>
      </div>
    </div>
    <div class="merge-slot" id="merge-slot-1">
      <input type="file" id="merge-input-1" accept=".mp3,audio/mpeg" style="display:none">
      <div class="merge-slot-placeholder">
        <div style="font-size:1.5rem; margin-bottom:6px;">📂</div>
        <strong data-i18n="mergeSlot1Title">두 번째 MP3 파일</strong>
        <p style="color:#888; font-size:0.85rem; margin-top:4px;" data-i18n="mergeSlotHint">클릭하거나 끌어다 놓기</p>
      </div>
      <div class="merge-slot-info" style="display:none">
        <span class="merge-slot-name"></span>
        <span class="merge-slot-duration" style="color:#7c6af7; font-weight:600;"></span>
        <div class="merge-slot-actions">
          <button class="btn-merge-edit" id="btn-merge-edit-1" data-i18n="btnMergeEdit">편집 ▶</button>
          <button class="merge-slot-clear" title="×">×</button>
        </div>
      </div>
      <div class="merge-editor" id="merge-editor-1">
        <div class="merge-waveform" id="merge-waveform-1"></div>
        <div class="merge-time-row">
          <div class="inputs-row">
            <label data-i18n="labelStart">시작(초)</label>
            <input type="number" id="merge-start-1" min="0" step="0.1" placeholder="0.0">
            <span class="sep">~</span>
            <label data-i18n="labelEnd">끝(초)</label>
            <input type="number" id="merge-end-1" min="0" step="0.1" placeholder="0.0">
          </div>
          <button class="btn-delete btn-merge-delete" id="btn-merge-delete-1" disabled data-i18n="btnDelete">구간 삭제</button>
        </div>
        <div class="merge-editor-controls">
          <button class="btn-secondary" id="btn-merge-play-1" data-i18n="btnPlay">▶ 재생</button>
          <button class="btn-undo" id="btn-merge-undo-1" disabled data-i18n="btnMergeUndo">↩ 실행취소</button>
          <span class="merge-edit-status" id="merge-edit-status-1"></span>
        </div>
      </div>
    </div>
    <ul id="merge-order-list" style="display:none;">
      <li data-idx="0" draggable="true">
        <span class="merge-order-num">1</span>
        <span class="merge-order-name"></span>
        <span class="merge-order-dur" style="color:#aaa; font-size:0.85rem; margin-left:auto;"></span>
      </li>
      <li data-idx="1" draggable="true">
        <span class="merge-order-num">2</span>
        <span class="merge-order-name"></span>
        <span class="merge-order-dur" style="color:#aaa; font-size:0.85rem; margin-left:auto;"></span>
      </li>
    </ul>
    <button class="btn-merge" id="btn-merge" disabled data-i18n="btnMerge">합치기 &amp; 다운로드</button>
    <div id="merge-error-msg"></div>
  </div>

  <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/plugin/wavesurfer.regions.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

  <script>

    function applyAllDeletions(buffer, segments) {
      const sorted = [...segments].sort((a, b) => a.start - b.start);
      const sr = buffer.sampleRate;
      const parts = [];
      let pos = 0;
      for (const seg of sorted) {
        const s = Math.floor(seg.start * sr);
        const e = Math.floor(seg.end   * sr);
        if (s > pos) parts.push({ from: pos, to: s });
        pos = Math.max(pos, e);
      }
      if (pos < buffer.length) parts.push({ from: pos, to: buffer.length });

      const totalLen = parts.reduce((sum, p) => sum + (p.to - p.from), 0);
      const out = audioCtx.createBuffer(buffer.numberOfChannels, totalLen, sr);
      let offset = 0;
      for (const part of parts) {
        for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
          out.copyToChannel(buffer.getChannelData(ch).subarray(part.from, part.to), ch, offset);
        }
        offset += part.to - part.from;
      }
      return out;
    }

    function applyRecovery(rs, re) {
      const affected = deletedRegions.filter(d => d.start < re && d.end > rs);
      if (affected.length === 0) return false;

      const affectedIds = new Set(affected.map(d => d.id));
      for (const d of affected) {
        const r = wavesurfer.regions.list[d.id];
        if (r) r.remove();
      }
      deletedRegions = deletedRegions.filter(d => !affectedIds.has(d.id));

      const newRegions = [];
      for (const d of affected) {
        if (d.start < rs) {
          const r = addDeletedRegionOverlay(d.start, rs);
          const entry = { start: d.start, end: rs, id: r.id };
          newRegions.push(entry);
          deletedRegions.push(entry);
        }
        if (d.end > re) {
          const r = addDeletedRegionOverlay(re, d.end);
          const entry = { start: re, end: d.end, id: r.id };
          newRegions.push(entry);
          deletedRegions.push(entry);
        }
      }

      undoStack.push({ added: newRegions, removed: affected });
      return true;
    }

    function markDeletedRegion(region) {

    function addDeletedRegionOverlay(start, end) {
      isAddingDeletedRegion = true;
      const r = wavesurfer.addRegion({ start, end, drag: false, resize: false, color: 'rgba(239, 68, 68, 0.25)' });
      markDeletedRegion(r);
      isAddingDeletedRegion = false;
      return r;
    }

    function floatTo16BitPCM(float32Array) {
      const int16 = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return int16;
    }

    function audioBufferToMp3(buffer) {
      const channels   = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const encoder    = new lamejs.Mp3Encoder(channels === 1 ? 1 : 2, sampleRate, 128);
      const blockSize  = 1152;
      const mp3chunks  = [];

      if (channels === 1) {
        const samples = floatTo16BitPCM(buffer.getChannelData(0));
        for (let i = 0; i < samples.length; i += blockSize) {
          const chunk   = samples.subarray(i, i + blockSize);
          const encoded = encoder.encodeBuffer(chunk);
          if (encoded.length > 0) mp3chunks.push(encoded);
        }
      } else {
        const left  = floatTo16BitPCM(buffer.getChannelData(0));
        const right = floatTo16BitPCM(buffer.getChannelData(1));
        for (let i = 0; i < left.length; i += blockSize) {
          const lChunk  = left.subarray(i, i + blockSize);
          const rChunk  = right.subarray(i, i + blockSize);
          const encoded = encoder.encodeBuffer(lChunk, rChunk);
          if (encoded.length > 0) mp3chunks.push(encoded);
        }
      }

      const flushed = encoder.flush();
      if (flushed.length > 0) mp3chunks.push(flushed);
      return new Blob(mp3chunks, { type: 'audio/mpeg' });
    }

    function sliceBuffer(buffer, startSec, endSec) {
      const sr    = buffer.sampleRate;
      const start = Math.floor(startSec * sr);
      const end   = Math.floor(endSec   * sr);
      const len   = end - start;
      const out   = audioCtx.createBuffer(buffer.numberOfChannels, len, sr);
      for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
        out.copyToChannel(buffer.getChannelData(ch).subarray(start, end), ch);
      }
      return out;
    }

    function deleteSegment(buffer, startSec, endSec) {
      const sr       = buffer.sampleRate;
      const startIdx = Math.floor(startSec * sr);
      const endIdx   = Math.floor(endSec   * sr);
      const newLen   = buffer.length - (endIdx - startIdx);
      const out      = audioCtx.createBuffer(buffer.numberOfChannels, newLen, sr);
      for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
        const src  = buffer.getChannelData(ch);
        const dest = new Float32Array(newLen);
        dest.set(src.subarray(0, startIdx), 0);
        dest.set(src.subarray(endIdx),      startIdx);
        out.copyToChannel(dest, ch);
      }
      return out;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function loadFile(file) {
      if (!file.type.includes('mpeg') && !file.name.toLowerCase().endsWith('.mp3')) {
        showError(t('errMp3Only'));
        return;
      }
      clearError();
      deletedRegions = [];
      undoStack      = [];
      editedBuffer   = null;
      btnUndo.disabled     = true;
      btnDownload.disabled = true;
      currentFileName = file.name.replace(/\.mp3$/i, '');

      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const arrayBuffer = e.target.result;
          const copyForDecode = arrayBuffer.slice(0);

          await audioCtx.resume();
          audioBuffer = await audioCtx.decodeAudioData(copyForDecode);

          if (wavesurfer) { wavesurfer.destroy(); wavesurfer = null; }
          currentRegion = null;
          setButtonsEnabled(false);
          startTimeEl.textContent = '-';
          endTimeEl.textContent   = '-';

          editor.style.display     = 'block';
          uploadArea.style.display = 'none';

          wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#4F86C6',
            progressColor: '#2D5FA6',
            height: 100,
            plugins: [
              WaveSurfer.regions.create({
                dragSelection: { slop: 5 },
                regions: []
              })
            ]
          });

          wavesurfer.on('play',   () => { btnPlay.textContent = t('btnPause'); });
          wavesurfer.on('pause',  () => { btnPlay.textContent = t('btnPlay'); });
          wavesurfer.on('finish', () => { btnPlay.textContent = t('btnPlay'); });

          wavesurfer.on('region-created', handleRegion);
          wavesurfer.on('region-updated', handleRegion);

          const blob    = new Blob([arrayBuffer], { type: 'audio/mpeg' });
          const blobUrl = URL.createObjectURL(blob);
          wavesurfer.load(blobUrl);
          wavesurfer.on('ready', () => URL.revokeObjectURL(blobUrl));
          wavesurfer.on('error', () => URL.revokeObjectURL(blobUrl));

        } catch (err) {
          showError(t('errReadFile') + err.message);
          editor.style.display     = 'none';
          uploadArea.style.display = 'block';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function syncInputsFromRegion(region) {
      inputStart.value = region.start.toFixed(1);

    function handleRegion(region) {
      if (isAddingDeletedRegion) return;
      const deletedIds = new Set(deletedRegions.map(d => d.id));
      Object.values(wavesurfer.regions.list).forEach(r => {
        if (r.id !== region.id && !deletedIds.has(r.id)) r.remove();

      currentRegion = region;
      startTimeEl.textContent = formatTime(region.start);
      endTimeEl.textContent   = formatTime(region.end);
      syncInputsFromRegion(region);
      setButtonsEnabled(true);

    btnDelete.addEventListener('click', () => {
      if (!audioBuffer || !currentRegion) return;

      const newStart = currentRegion.start;
      const newEnd   = currentRegion.end;

      const overlapping = deletedRegions.filter(d => d.start < newEnd && d.end > newStart);

      let mergedStart = newStart;
      let mergedEnd   = newEnd;
      for (const d of overlapping) {
        mergedStart = Math.min(mergedStart, d.start);
        mergedEnd   = Math.max(mergedEnd,   d.end);
      }

      const overlappingIds = new Set(overlapping.map(d => d.id));
      for (const d of overlapping) {
        const r = wavesurfer.regions.list[d.id];
        if (r) r.remove();
      }
      deletedRegions = deletedRegions.filter(d => !overlappingIds.has(d.id));

      currentRegion.remove();
      const mergedRegion = addDeletedRegionOverlay(mergedStart, mergedEnd);
      const added = { start: mergedStart, end: mergedEnd, id: mergedRegion.id };
      deletedRegions.push(added);
      undoStack.push({ added: [added], removed: overlapping });

      currentRegion = null;
      startTimeEl.textContent = '-';
      endTimeEl.textContent   = '-';
      inputStart.value = '';
      inputEnd.value   = '';
      setButtonsEnabled(false);

      btnDownload.disabled = false;

    btnRecover.addEventListener('click', () => {
      if (!audioBuffer || !currentRegion) return;

      const recovered = applyRecovery(currentRegion.start, currentRegion.end);
      if (!recovered) {
        showError(t('errNoDeleted'));
        return;
      }

      currentRegion.remove();
      currentRegion = null;
      startTimeEl.textContent = '-';
      endTimeEl.textContent   = '-';
      inputStart.value = '';
      inputEnd.value   = '';
      setButtonsEnabled(false);
      btnUndo.disabled     = false;
      btnDownload.disabled = deletedRegions.length === 0;
    });

    btnUndo.addEventListener('click', () => {
      if (undoStack.length === 0) return;
      const { added, removed } = undoStack.pop();

      for (const a of added) {
        const r = wavesurfer.regions.list[a.id];
        if (r) r.remove();
        deletedRegions = deletedRegions.filter(d => d.id !== a.id);
      }

      for (const seg of removed) {
        const restored = addDeletedRegionOverlay(seg.start, seg.end);
        deletedRegions.push({ start: seg.start, end: seg.end, id: restored.id });

        for (const entry of undoStack) {
          for (const a of entry.added) {
            if (a.id === seg.id) a.id = restored.id;
          }
          for (const rm of entry.removed) {
            if (rm.id === seg.id) rm.id = restored.id;
          }
        }
      }

      btnUndo.disabled     = undoStack.length === 0;
      btnDownload.disabled = deletedRegions.length === 0;
    });

    btnDownload.addEventListener('click', () => {
      if (deletedRegions.length === 0 && !editedBuffer) return;
      setLoading(btnDownload, true);
      setTimeout(() => {
        try {
          let outputBuffer, suffix;
          if (deletedRegions.length > 0) {
            outputBuffer = applyAllDeletions(audioBuffer, deletedRegions);
            suffix = t('suffixEdit');
          } else {
            outputBuffer = editedBuffer;
            suffix = editedSuffix;
          }
          const mp3 = audioBufferToMp3(outputBuffer);
          downloadBlob(mp3, currentFileName + suffix + '.mp3');
        } catch (err) {
          showError(t('errDownload') + err.message);
        } finally {
          btnDownload.textContent = t('btnDownload');
          btnDownload.disabled    = deletedRegions.length === 0 && !editedBuffer;
        }
      }, 50);
    });

    {
      const waveformEl = document.getElementById('waveform');
      let touchRegionStart = null;
      let touchDragRegion  = null;

      waveformEl.addEventListener('pointerdown', (e) => {
        if (e.pointerType !== 'touch' || !wavesurfer || !wavesurfer.getDuration()) return;
        e.preventDefault();
        waveformEl.setPointerCapture(e.pointerId);

        const rect = waveformEl.getBoundingClientRect();
        touchRegionStart = (e.clientX - rect.left) / rect.width * wavesurfer.getDuration();
        touchDragRegion  = null;

        const deletedIds = new Set(deletedRegions.map(d => d.id));
        Object.values(wavesurfer.regions.list).forEach(r => {
          if (!deletedIds.has(r.id)) r.remove();
        });
        currentRegion = null;
        setButtonsEnabled(false);
        startTimeEl.textContent = '-';
        endTimeEl.textContent   = '-';
        inputStart.value = '';
        inputEnd.value   = '';
      });

      waveformEl.addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'touch' || touchRegionStart === null || !wavesurfer) return;

        const rect    = waveformEl.getBoundingClientRect();
        const ratio   = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const current = ratio * wavesurfer.getDuration();
        const start   = Math.min(touchRegionStart, current);
        const end     = Math.max(touchRegionStart, current);
        if (end - start < 0.05) return;

        isAddingDeletedRegion = true;
        if (touchDragRegion) {
          touchDragRegion.update({ start, end });
        } else {
          touchDragRegion = wavesurfer.addRegion({ start, end, drag: false, resize: false });
        }
        isAddingDeletedRegion = false;

        startTimeEl.textContent = formatTime(start);
        endTimeEl.textContent   = formatTime(end);
        inputStart.value = start.toFixed(1);
        inputEnd.value   = end.toFixed(1);
      });

      waveformEl.addEventListener('pointerup', (e) => {
        if (e.pointerType !== 'touch' || !wavesurfer) return;

        if (touchDragRegion && (touchDragRegion.end - touchDragRegion.start) > 0.05) {
          isAddingDeletedRegion = true;
          touchDragRegion.update({ drag: true, resize: true });
          isAddingDeletedRegion = false;
          currentRegion = touchDragRegion;
          setButtonsEnabled(true);
        } else if (touchDragRegion) {
          touchDragRegion.remove();
        }
        touchRegionStart = null;
        touchDragRegion  = null;
      });

      waveformEl.addEventListener('pointercancel', (e) => {
        if (e.pointerType !== 'touch') return;
        if (touchDragRegion) touchDragRegion.remove();
        touchRegionStart = null;
        touchDragRegion  = null;
        currentRegion = null;
        setButtonsEnabled(false);
        startTimeEl.textContent = '-';
        endTimeEl.textContent   = '-';
      });
    }

    // ── 탭 전환 ──────────────────────────────────────────────
    function switchTab(tab) {
      const isEditor = tab === 'editor';
      document.getElementById('editor-section').style.display = isEditor ? 'flex'  : 'none';
      document.getElementById('merge-section').style.display  = isEditor ? 'none'  : 'block';
      document.getElementById('tab-editor').classList.toggle('active', isEditor);
      document.getElementById('tab-merge').classList.toggle('active', !isEditor);
    }
    document.getElementById('tab-editor').addEventListener('click', () => switchTab('editor'));
    document.getElementById('tab-merge').addEventListener('click', () => switchTab('merge'));

    // ── 합치기 슬롯 편집 ─────────────────────────────────────
    function addMergeDeletedOverlay(idx, start, end) {
      const slot = mergeSlots[idx];
      slot.isAddingOverlay = true;
      const r = slot.wavesurfer.addRegion({ start, end, drag: false, resize: false, color: 'rgba(239, 68, 68, 0.25)' });
      markDeletedRegion(r);
      slot.isAddingOverlay = false;
      return r;
    }

    function handleMergeRegion(idx, region) {
      const slot = mergeSlots[idx];
      if (slot.isAddingOverlay) return;
      const deletedIds = new Set(slot.deletedRegions.map(d => d.id));
      Object.values(slot.wavesurfer.regions.list).forEach(r => {
        if (r.id !== region.id && !deletedIds.has(r.id)) r.remove();
      });
      slot.currentRegion = region;
      document.getElementById(`merge-start-${idx}`).value = region.start.toFixed(1);
      document.getElementById(`merge-end-${idx}`).value   = region.end.toFixed(1);
      document.getElementById(`btn-merge-delete-${idx}`).disabled = false;
    }

    function updateMergeEditStatus(idx) {
      const count = mergeSlots[idx] ? mergeSlots[idx].deletedRegions.length : 0;
      const el = document.getElementById(`merge-edit-status-${idx}`);
      if (el) el.textContent = count > 0 ? t('deletedCount', count) : '';
    }

    function attachMergeTouchDrag(idx) {
      const el   = document.getElementById(`merge-waveform-${idx}`);
      const slot = mergeSlots[idx];
      let touchStart = null, touchRegion = null;

      el.addEventListener('pointerdown', (e) => {
        if (e.pointerType !== 'touch' || !slot.wavesurfer || !slot.wavesurfer.getDuration()) return;
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        const rect = el.getBoundingClientRect();
        touchStart = (e.clientX - rect.left) / rect.width * slot.wavesurfer.getDuration();
        touchRegion = null;
        const deletedIds = new Set(slot.deletedRegions.map(d => d.id));
        Object.values(slot.wavesurfer.regions.list).forEach(r => { if (!deletedIds.has(r.id)) r.remove(); });
        slot.currentRegion = null;
        document.getElementById(`merge-start-${idx}`).value = '';
        document.getElementById(`merge-end-${idx}`).value   = '';
        document.getElementById(`btn-merge-delete-${idx}`).disabled = true;
      });

      el.addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'touch' || touchStart === null || !slot.wavesurfer) return;
        const rect  = el.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const cur   = ratio * slot.wavesurfer.getDuration();
        const start = Math.min(touchStart, cur), end = Math.max(touchStart, cur);
        if (end - start < 0.05) return;
        slot.isAddingOverlay = true;
        if (touchRegion) { touchRegion.update({ start, end }); }
        else { touchRegion = slot.wavesurfer.addRegion({ start, end, drag: false, resize: false }); }
        slot.isAddingOverlay = false;
        document.getElementById(`merge-start-${idx}`).value = start.toFixed(1);
        document.getElementById(`merge-end-${idx}`).value   = end.toFixed(1);
      });

      el.addEventListener('pointerup', (e) => {
        if (e.pointerType !== 'touch' || !slot.wavesurfer) return;
        if (touchRegion && (touchRegion.end - touchRegion.start) > 0.05) {
          slot.isAddingOverlay = true;
          touchRegion.update({ drag: true, resize: true });
          slot.isAddingOverlay = false;
          slot.currentRegion = touchRegion;
          document.getElementById(`btn-merge-delete-${idx}`).disabled = false;
        } else if (touchRegion) { touchRegion.remove(); }
        touchStart = null; touchRegion = null;
      });

      el.addEventListener('pointercancel', (e) => {
        if (e.pointerType !== 'touch') return;
        if (touchRegion) touchRegion.remove();
        touchStart = null; touchRegion = null;
        slot.currentRegion = null;
        document.getElementById(`btn-merge-delete-${idx}`).disabled = true;
        document.getElementById(`merge-start-${idx}`).value = '';
        document.getElementById(`merge-end-${idx}`).value   = '';
      });
    }

    function initMergeWavesurfer(idx) {
      const slot = mergeSlots[idx];
      if (slot.wavesurfer) return;
      const ws = WaveSurfer.create({
        container: `#merge-waveform-${idx}`,
        waveColor: '#4F86C6',
        progressColor: '#2D5FA6',
        height: 100,
        plugins: [ WaveSurfer.regions.create({ dragSelection: { slop: 5 }, regions: [] }) ]
      });
      slot.wavesurfer = ws;
      const bp = document.getElementById(`btn-merge-play-${idx}`);
      ws.on('play',   () => { bp.textContent = t('btnPause'); });
      ws.on('pause',  () => { bp.textContent = t('btnPlay'); });
      ws.on('finish', () => { bp.textContent = t('btnPlay'); });
      ws.on('region-created', (r) => handleMergeRegion(idx, r));
      ws.on('region-updated', (r) => handleMergeRegion(idx, r));
      const url = URL.createObjectURL(slot.rawBlob);
      ws.load(url);
      ws.on('ready', () => URL.revokeObjectURL(url));
      ws.on('error', () => URL.revokeObjectURL(url));
      attachMergeTouchDrag(idx);
    }

    function toggleMergeEditor(idx) {
      const slot  = mergeSlots[idx];
      const panel = document.getElementById(`merge-editor-${idx}`);
      const btn   = document.getElementById(`btn-merge-edit-${idx}`);
      slot.isEditorOpen = !slot.isEditorOpen;
      panel.classList.toggle('open', slot.isEditorOpen);
      btn.classList.toggle('open', slot.isEditorOpen);
      btn.textContent = slot.isEditorOpen ? t('btnMergeEditOpen') : t('btnMergeEdit');
      if (slot.isEditorOpen && !slot.wavesurfer) initMergeWavesurfer(idx);
    }

    function mergeDeleteRegion(idx) {
      const slot = mergeSlots[idx];
      if (!slot.audioBuffer || !slot.currentRegion) return;
      const ws = slot.wavesurfer;
      const newStart = slot.currentRegion.start, newEnd = slot.currentRegion.end;
      const overlapping = slot.deletedRegions.filter(d => d.start < newEnd && d.end > newStart);
      let mStart = newStart, mEnd = newEnd;
      for (const d of overlapping) { mStart = Math.min(mStart, d.start); mEnd = Math.max(mEnd, d.end); }
      const overIds = new Set(overlapping.map(d => d.id));
      for (const d of overlapping) { const r = ws.regions.list[d.id]; if (r) r.remove(); }
      slot.deletedRegions = slot.deletedRegions.filter(d => !overIds.has(d.id));
      slot.currentRegion.remove();
      const merged = addMergeDeletedOverlay(idx, mStart, mEnd);
      const added = { start: mStart, end: mEnd, id: merged.id };
      slot.deletedRegions.push(added);
      slot.undoStack.push({ added: [added], removed: overlapping });
      slot.currentRegion = null;
      document.getElementById(`merge-start-${idx}`).value = '';
      document.getElementById(`merge-end-${idx}`).value   = '';
      document.getElementById(`btn-merge-delete-${idx}`).disabled = true;
      document.getElementById(`btn-merge-undo-${idx}`).disabled   = false;
      updateMergeEditStatus(idx);
    }

    function mergeUndoDelete(idx) {
      const slot = mergeSlots[idx];
      if (slot.undoStack.length === 0) return;
      const ws = slot.wavesurfer;
      const { added, removed } = slot.undoStack.pop();
      for (const a of added) {
        const r = ws.regions.list[a.id]; if (r) r.remove();
        slot.deletedRegions = slot.deletedRegions.filter(d => d.id !== a.id);
      }
      for (const seg of removed) {
        const restored = addMergeDeletedOverlay(idx, seg.start, seg.end);
        slot.deletedRegions.push({ start: seg.start, end: seg.end, id: restored.id });
        for (const entry of slot.undoStack) {
          for (const a of entry.added)    { if (a.id  === seg.id) a.id  = restored.id; }
          for (const rm of entry.removed) { if (rm.id === seg.id) rm.id = restored.id; }
        }
      }
      document.getElementById(`btn-merge-undo-${idx}`).disabled = slot.undoStack.length === 0;
      updateMergeEditStatus(idx);
    }

    function resetMergeSlotEditor(idx) {
      const slot = mergeSlots[idx];
      if (slot.wavesurfer) { slot.wavesurfer.destroy(); slot.wavesurfer = null; }
      slot.deletedRegions = []; slot.undoStack = [];
      slot.isEditorOpen = false; slot.currentRegion = null;
      document.getElementById(`merge-editor-${idx}`).classList.remove('open');
      const editBtn = document.getElementById(`btn-merge-edit-${idx}`);
      editBtn.classList.remove('open'); editBtn.textContent = t('btnMergeEdit');
      document.getElementById(`merge-edit-status-${idx}`).textContent = '';
      document.getElementById(`btn-merge-delete-${idx}`).disabled = true;
      document.getElementById(`btn-merge-undo-${idx}`).disabled   = true;
    }

    // ── 합치기 ───────────────────────────────────────────────
    function mergeBuffers(bufA, bufB) {
      const channels = Math.max(bufA.numberOfChannels, bufB.numberOfChannels);
      const sr = bufA.sampleRate;
      const out = audioCtx.createBuffer(channels, bufA.length + bufB.length, sr);
      for (let ch = 0; ch < channels; ch++) {
        const srcA = Math.min(ch, bufA.numberOfChannels - 1);
        const srcB = Math.min(ch, bufB.numberOfChannels - 1);
        out.copyToChannel(bufA.getChannelData(srcA), ch, 0);
        out.copyToChannel(bufB.getChannelData(srcB), ch, bufA.length);
      }
      return out;
    }

    function updateMergeSlotUI(idx) {
      const slot = document.getElementById(`merge-slot-${idx}`);
      const data = mergeSlots[idx];
      if (data.audioBuffer) {
        slot.classList.add('loaded');
        slot.querySelector('.merge-slot-placeholder').style.display = 'none';
        const info = slot.querySelector('.merge-slot-info');
        info.style.display = 'flex';
        info.querySelector('.merge-slot-name').textContent = data.name;
        info.querySelector('.merge-slot-duration').textContent = data.duration.toFixed(1) + t('secLabel');
      } else {
        slot.classList.remove('loaded');
        slot.querySelector('.merge-slot-placeholder').style.display = 'block';
        slot.querySelector('.merge-slot-info').style.display = 'none';
      }
      document.getElementById('btn-merge').disabled = !(mergeSlots[0].audioBuffer && mergeSlots[1].audioBuffer);
    }

    function updateMergeOrderList() {
      const list = document.getElementById('merge-order-list');
      const bothLoaded = mergeSlots[0].audioBuffer && mergeSlots[1].audioBuffer;
      list.style.display = bothLoaded ? 'block' : 'none';
      if (!bothLoaded) return;
      list.querySelectorAll('li').forEach((li, i) => {
        const idx = mergeOrder[i];
        li.dataset.idx = idx;
        li.querySelector('.merge-order-num').textContent = i + 1;
        li.querySelector('.merge-order-name').textContent = mergeSlots[idx].name;
        li.querySelector('.merge-order-dur').textContent = mergeSlots[idx].duration.toFixed(1) + t('secLabel');
      });
    }

    function loadMergeFile(idx, file) {
      if (!file.type.includes('mpeg') && !file.name.toLowerCase().endsWith('.mp3')) {
        document.getElementById('merge-error-msg').textContent = t('errMp3Only');
        return;
      }
      document.getElementById('merge-error-msg').textContent = '';
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          await audioCtx.resume();
          const raw = e.target.result;
          const buf = await audioCtx.decodeAudioData(raw.slice(0));
          resetMergeSlotEditor(idx);
          mergeSlots[idx].audioBuffer = buf;
          mergeSlots[idx].name        = file.name.replace(/\.mp3$/i, '');
          mergeSlots[idx].duration    = buf.duration;
          mergeSlots[idx].rawBlob     = new Blob([raw], { type: 'audio/mpeg' });
          updateMergeSlotUI(idx);
          updateMergeOrderList();
        } catch (err) {
          document.getElementById('merge-error-msg').textContent = t('errReadFile') + err.message;
        }
      };
      reader.readAsArrayBuffer(file);
    }

    [0, 1].forEach(idx => {
      const slot  = document.getElementById(`merge-slot-${idx}`);
      const input = document.getElementById(`merge-input-${idx}`);

      slot.addEventListener('click', (e) => {
        if (!mergeSlots[idx].audioBuffer && !e.target.classList.contains('merge-slot-clear'))
          input.click();
      });
      input.addEventListener('change', (e) => {
        if (e.target.files[0]) loadMergeFile(idx, e.target.files[0]);
      });
      slot.addEventListener('dragover', (e) => {
        if (!mergeSlots[idx].audioBuffer) { e.preventDefault(); slot.classList.add('drag-over'); }
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
      slot.addEventListener('drop', (e) => {
        e.preventDefault(); slot.classList.remove('drag-over');
        if (!mergeSlots[idx].audioBuffer && e.dataTransfer.files[0])
          loadMergeFile(idx, e.dataTransfer.files[0]);
      });
      slot.querySelector('.merge-slot-clear').addEventListener('click', (e) => {
        e.stopPropagation();
        resetMergeSlotEditor(idx);
        mergeSlots[idx].audioBuffer = null;
        mergeSlots[idx].name        = '';
        mergeSlots[idx].duration    = 0;
        mergeSlots[idx].rawBlob     = null;
        mergeOrder = [0, 1];
        input.value = '';
        updateMergeSlotUI(idx);
        updateMergeOrderList();
        document.getElementById('merge-error-msg').textContent = '';
      });

      document.getElementById(`btn-merge-edit-${idx}`).addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMergeEditor(idx);
      });
      document.getElementById(`btn-merge-play-${idx}`).addEventListener('click', () => {
        if (mergeSlots[idx].wavesurfer) mergeSlots[idx].wavesurfer.playPause();
      });
      document.getElementById(`btn-merge-delete-${idx}`).addEventListener('click', () => {
        mergeDeleteRegion(idx);
      });
      document.getElementById(`btn-merge-undo-${idx}`).addEventListener('click', () => {
        mergeUndoDelete(idx);
      });
    });

    // 순서 목록 드래그 재정렬
    let mergeDragSrc = null;
    const mergeList = document.getElementById('merge-order-list');
    mergeList.addEventListener('dragstart', (e) => {
      mergeDragSrc = parseInt(e.target.closest('li').dataset.idx);
      e.target.closest('li').style.opacity = '0.5';
    });
    mergeList.addEventListener('dragend', (e) => {
      e.target.closest('li').style.opacity = '1';
      mergeList.querySelectorAll('li').forEach(li => li.classList.remove('drag-over-item'));
    });
    mergeList.addEventListener('dragover', (e) => {
      e.preventDefault();
      const li = e.target.closest('li');
      if (li) {
        mergeList.querySelectorAll('li').forEach(l => l.classList.remove('drag-over-item'));
        li.classList.add('drag-over-item');
      }
    });
    mergeList.addEventListener('drop', (e) => {
      e.preventDefault();
      const li = e.target.closest('li');
      if (!li) return;
      const targetIdx = parseInt(li.dataset.idx);
      if (mergeDragSrc !== null && mergeDragSrc !== targetIdx) {
        const a = mergeOrder.indexOf(mergeDragSrc);
        const b = mergeOrder.indexOf(targetIdx);
        [mergeOrder[a], mergeOrder[b]] = [mergeOrder[b], mergeOrder[a]];
        updateMergeOrderList();
      }
      mergeDragSrc = null;
    });

    document.getElementById('btn-merge').addEventListener('click', () => {
      const [idxA, idxB] = mergeOrder;
      if (!mergeSlots[idxA].audioBuffer || !mergeSlots[idxB].audioBuffer) return;
      const btn = document.getElementById('btn-merge');
      setLoading(btn, true);
      setTimeout(() => {
        try {
          const editedA = mergeSlots[idxA].deletedRegions.length > 0
            ? applyAllDeletions(mergeSlots[idxA].audioBuffer, mergeSlots[idxA].deletedRegions)
            : mergeSlots[idxA].audioBuffer;
          const editedB = mergeSlots[idxB].deletedRegions.length > 0
            ? applyAllDeletions(mergeSlots[idxB].audioBuffer, mergeSlots[idxB].deletedRegions)
            : mergeSlots[idxB].audioBuffer;
          const merged = mergeBuffers(editedA, editedB);
          const mp3    = audioBufferToMp3(merged);
          downloadBlob(mp3, `${mergeSlots[idxA].name}_${mergeSlots[idxB].name}${t('suffixMerge')}.mp3`);
        } catch (err) {
          document.getElementById('merge-error-msg').textContent = t('errMerge') + err.message;
        } finally {
          btn.textContent = t('btnMerge');
          btn.disabled    = false;
        }
      }, 50);
    });

    // ── 초기 언어 적용 ────────────────────────────────────────
    applyLang(currentLang);
  </script>
